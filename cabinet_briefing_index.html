<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국무회의 브리핑 — 슬로우레터</title>
<meta property="og:title" content="국무회의 브리핑 — 슬로우레터">
<meta property="og:description" content="대통령 국무회의 발언과 부처 답변을 AI로 분석·요약합니다.">
<style>
:root {
  --bg: #fdad00; --card: #fff; --text: #1a1a1a; --sub: #555;
  --accent: #1d4ed8; --border: #e5e7eb;
  --pres: #1e3a5f; --sidebar-width: 240px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.8; font-size: 15px;
}
.sidebar {
  position: fixed; top: 0; right: 0;
  width: var(--sidebar-width); height: 100vh;
  background: #1c1917; color: #e7e5e4;
  padding: 1.5rem 1.2rem;
  display: flex; flex-direction: column;
  z-index: 100; overflow-y: auto;
}
.sidebar .brand { font-size: 1.1rem; font-weight: 700; color: #fdad00; margin-bottom: 0.25rem; }
.sidebar .brand-sub { font-size: 0.75rem; color: #a8a29e; margin-bottom: 1.2rem; }
.sidebar .divider { border: none; border-top: 1px solid #333; margin: 1rem 0; }
.sidebar .nav-label { font-size: 0.7rem; color: #a8a29e; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem; }
.sidebar .nav-link {
  display: block; padding: 0.55rem 0.8rem; margin-bottom: 0.3rem;
  border-radius: 6px; font-size: 0.85rem; color: #e7e5e4;
  text-decoration: none; transition: background 0.15s;
}
.sidebar .nav-link:hover { background: #333; }
.sidebar .nav-link.active { background: #fdad00; color: #1c1917; font-weight: 600; }
.sidebar-footer { margin-top: auto; font-size: 0.65rem; color: #57534e; }
.sidebar-toggle {
  display: none; position: fixed; top: 0.75rem; right: 0.75rem;
  z-index: 200; background: #1c1917; color: #fdad00;
  border: none; border-radius: 6px; padding: 0.5rem 0.7rem;
  font-size: 1.1rem; cursor: pointer;
}
.main { margin-right: var(--sidebar-width); }
.hero {
  background: linear-gradient(135deg, #111 0%, #1e293b 100%);
  color: #fff; padding: 60px 20px 48px; text-align: left;
  max-width: 760px; margin: 0 auto;
}
.hero .label { font-size: 12px; opacity: .5; letter-spacing: 3px; text-transform: uppercase; }
.hero h1 { font-size: 28px; font-weight: 800; margin: 12px 0 8px; line-height: 1.4; }
.hero .lead { margin-top: 16px; font-size: 15px; opacity: .85; line-height: 1.7; max-width: 640px; }
.container { max-width: 760px; margin: 0 auto; padding: 32px 16px; }
.meeting-card {
  background: var(--card); border-radius: 10px; margin-bottom: 14px;
  border: 1px solid var(--border); overflow: hidden;
  text-decoration: none; color: var(--text); display: block;
  transition: box-shadow 0.2s, transform 0.1s;
}
.meeting-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-1px); }
.meeting-card-inner { padding: 20px 22px; display: flex; align-items: center; gap: 16px; }
.meeting-num {
  font-size: 13px; font-weight: 700; color: #fff; background: var(--pres);
  border-radius: 6px; padding: 6px 12px; white-space: nowrap; min-width: 56px; text-align: center;
}
.meeting-info { flex: 1; }
.meeting-info .title { font-size: 15px; font-weight: 700; line-height: 1.5; margin-bottom: 2px; }
.meeting-info .date { font-size: 13px; color: var(--sub); }
.meeting-arrow { font-size: 18px; color: #ccc; flex-shrink: 0; }
.note {
  background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
  padding: 14px 18px; margin-bottom: 28px; font-size: 13px; color: #92400e; line-height: 1.7;
}
.footer { text-align: left; padding: 36px 16px; color: #aaa; font-size: 11px; line-height: 1.7; max-width: 760px; margin: 0 auto; }
.footer a { color: var(--accent); text-decoration: none; }
#loading { text-align: center; padding: 40px; color: var(--sub); font-size: 14px; }
@media (max-width: 768px) {
  .sidebar { transform: translateX(100%); transition: transform 0.25s; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: block; }
  .main { margin-right: 0; }
  .hero h1 { font-size: 22px; }
}
</style>
</head>
<body>
<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
<aside class="sidebar" id="sidebar">
  <a href="https://slownews.kr" target="_blank" rel="noopener" style="text-decoration:none;">
    <div class="brand">슬로우레터</div>
  </a>
  <div class="brand-sub">국무회의 브리핑.</div>
  <hr class="divider">
  <div class="nav-label">회의록</div>
  <div id="meeting-nav"><!-- meetings.json에서 자동 로딩 --></div>
  <hr class="divider">
  <a class="nav-link" href="./">빠른 검색</a>
  <div class="sidebar-footer">
    <hr class="divider">
    <span style="color:#fdad00;">slownews.kr</span>
  </div>
</aside>
<div class="main">
<div class="hero">
  <div class="label">슬로우레터</div>
  <h1>국무회의 브리핑.</h1>
  <div class="lead">
    대통령 국무회의 영상을 AI 에이전트로 분석·요약하고 데스킹을 거칩니다.
    대통령 발언, 부처 답변, 지시·결정사항을 안건별로 정리합니다.
  </div>
</div>
<div class="container">
<div class="note">
  Lilys AI 트랜스크립트 기반. 요약은 AI가, 편집 판단은 사람이 합니다.<br>
  발언은 최대한 원문을 그대로 인용하되, 문답으로 구성하는 과정에서 표현을 다듬었습니다.
</div>
<div id="meeting-list"><div id="loading">회의록 목록을 불러오는 중...</div></div>
<div class="footer">
  국무회의 브리핑 — <a href="https://slownews.kr" target="_blank">slownews.kr</a><br>
  AI 분석 · 사람 편집
</div>
</div>
</div>
<script>
var descriptions = {
  13: '중동 전쟁 한 달, 전속고발제 개편 논의.',
  11: '중동 전쟁 25일째, 에너지 비상대응 체계 가동.',
  10: '석유 최고가격제, 지방 우대, 국민성장펀드.',
  9: '물가·에너지·금융 3중 대응, 포상금 혁신 선언.',
  8: '중동 전쟁 6일째, 비상 경제·에너지 대응.',
  6: '브라질 국빈 방문, K-관광 강국, 담합 제재.',
  5: '국제질서 변화 대응, 외국인력 정책, AI 전략.',
  4: '수출 600억 불, 창업 대전환, 연명의료·담합 제재.'
};
fetch('data/meetings.json')
  .then(function(r) { return r.json(); })
  .then(function(meetings) {
    var html = '';
    meetings.forEach(function(m) {
      var desc = descriptions[m.id] || '';
      html += '<a class="meeting-card" href="' + m.file + '">' +
        '<div class="meeting-card-inner">' +
        '<div class="meeting-num">' + m.title + '</div>' +
        '<div class="meeting-info">' +
        '<div class="title">' + desc + '</div>' +
        '<div class="date">' + m.date + '</div>' +
        '</div>' +
        '<div class="meeting-arrow">\u203a</div>' +
        '</div></a>';
    });
    document.getElementById('meeting-list').innerHTML = html;
  })
  .catch(function() { document.getElementById('loading').textContent = '목록을 불러올 수 없습니다.'; });
</script>
<script src="js/sidebar-loader.js"></script>
</body>
</html>
