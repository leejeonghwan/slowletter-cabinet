<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국무회의 브리핑 — 슬로우레터</title>
<meta property="og:title" content="국무회의 브리핑 — 슬로우레터">
<meta property="og:description" content="대통령 국무회의 발언과 부처 답변을 AI로 분석·요약합니다.">
<style>
:root {
  --bg: #fdad00; --card: #fff; --text: #1a1a1a; --sub: #555;
  --accent: #1d4ed8; --accent2: #7c3aed; --border: #e5e7eb;
  --green: #059669; --amber: #d97706;
  --pres: #1e3a5f; --resp: #4a5568;
  --sidebar-width: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.85; font-size: 17px;
}

/* Sidebar */
.sidebar {
  position: fixed; top: 0; right: 0;
  width: var(--sidebar-width); height: 100vh;
  background: #1c1917; color: #e7e5e4;
  padding: 1.8rem 1.4rem;
  display: flex; flex-direction: column;
  z-index: 100; overflow-y: auto;
}
.sidebar .brand { font-size: 1.2rem; font-weight: 700; color: #fdad00; margin-bottom: 0.25rem; }
.sidebar .brand-sub { font-size: 0.8rem; color: #a8a29e; margin-bottom: 1.4rem; }
.sidebar .divider { border: none; border-top: 1px solid #333; margin: 1rem 0; }
.sidebar .nav-label { font-size: 0.75rem; color: #a8a29e; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem; }
.sidebar .nav-link {
  display: block; padding: 0.6rem 0.9rem; margin-bottom: 0.3rem;
  border-radius: 6px; font-size: 0.9rem; color: #e7e5e4;
  text-decoration: none; transition: background 0.15s; cursor: pointer;
}
.sidebar .nav-link:hover { background: #333; }
.sidebar .nav-link.active { background: #fdad00; color: #1c1917; font-weight: 600; }
.sidebar-footer { margin-top: auto; font-size: 0.7rem; color: #57534e; }
.sidebar-toggle {
  display: none; position: fixed; top: 0.75rem; right: 0.75rem;
  z-index: 200; background: #1c1917; color: #fdad00;
  border: none; border-radius: 6px; padding: 0.5rem 0.7rem;
  font-size: 1.2rem; cursor: pointer;
}

.main { margin-right: var(--sidebar-width); }

/* Hero */
.hero {
  background: linear-gradient(135deg, #111 0%, #1e293b 100%);
  color: #fff; padding: 48px 24px 36px; text-align: left;
  max-width: 900px; margin: 0 auto;
}
.hero .label { font-size: 13px; opacity: .5; letter-spacing: 3px; text-transform: uppercase; }
.hero h1 { font-size: 30px; font-weight: 800; margin: 10px 0 8px; line-height: 1.4; }
.hero .lead { margin-top: 14px; font-size: 16px; opacity: .8; line-height: 1.7; max-width: 680px; }

/* Note */
.note {
  background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
  padding: 14px 18px; margin-bottom: 20px; font-size: 14px; color: #92400e; line-height: 1.7;
}

/* Stats bar */
.stats-bar {
  display: flex; gap: 32px; flex-wrap: wrap;
  padding: 16px 24px; background: #0f172a; color: #94a3b8; font-size: 13px;
  max-width: 900px; margin: 0 auto;
}
.stats-bar .v { color: #fff; font-weight: 700; font-size: 20px; display: block; }

/* Container */
.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

/* Search & Filters */
.search-box {
  position: sticky; top: 0; z-index: 10; background: var(--bg);
  padding: 10px 0 8px;
}
.search-box input {
  width: 100%; padding: 14px 18px; border: 2px solid #e5e7eb;
  border-radius: 12px; font-size: 17px; outline: none;
  background: #fff;
}
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,78,216,.12); }
.search-box input::placeholder { color: #aaa; }

.filters {
  display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0 18px;
  align-items: center;
}
.filter-chip {
  padding: 6px 16px; border-radius: 20px; font-size: 14px;
  border: 1px solid #d1d5db; background: #fff; color: var(--sub);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--pres); color: #fff; border-color: var(--pres); }
.filter-label { font-size: 13px; color: var(--sub); font-weight: 600; letter-spacing: .3px; }
.result-count { font-size: 13px; color: var(--sub); margin-left: auto; }

/* Meeting section header */
.meeting-header {
  display: flex; align-items: baseline; gap: 12px;
  margin: 28px 0 14px; padding-bottom: 8px;
  border-bottom: 2px solid #1e3a5f;
}
.meeting-header:first-child { margin-top: 8px; }
.meeting-header h2 {
  font-size: 20px; font-weight: 800; color: var(--pres);
}
.meeting-header .meeting-date {
  font-size: 14px; color: var(--sub); font-weight: 400;
}
.meeting-header .meeting-desc {
  font-size: 14px; color: var(--sub); margin-left: auto;
}

/* Topic card */
.topic-card {
  background: var(--card); border-radius: 12px; margin-bottom: 12px;
  border: 1px solid var(--border); overflow: hidden;
  transition: box-shadow 0.15s;
}
.topic-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,.07); }
.topic-card.highlighted { box-shadow: 0 0 0 3px var(--accent), 0 2px 14px rgba(0,0,0,.07); }
.topic-head {
  padding: 16px 20px; cursor: pointer;
  display: flex; align-items: flex-start; gap: 14px;
}
.topic-badge {
  font-size: 12px; font-weight: 700; color: #fff; background: var(--pres);
  border-radius: 5px; padding: 4px 10px; white-space: nowrap; margin-top: 3px;
  flex-shrink: 0;
}
.topic-meta { flex: 1; }
.topic-meta h3 { font-size: 17px; font-weight: 700; line-height: 1.55; margin-bottom: 3px; }
.topic-meta .date-line { font-size: 13px; color: var(--sub); }
.topic-chevron { font-size: 20px; color: #bbb; transition: transform .2s; margin-top: 3px; flex-shrink: 0; }
.topic-card.open .topic-chevron { transform: rotate(90deg); }
.topic-body { display: none; padding: 0 20px 18px; border-top: 1px solid var(--border); }
.topic-card.open .topic-body { display: block; }

/* Permalink */
.permalink {
  font-size: 12px; color: #aaa; text-decoration: none; margin-left: 6px;
  opacity: 0; transition: opacity .15s;
}
.topic-head:hover .permalink { opacity: 1; }
.permalink:hover { color: var(--accent); }

/* Summary */
.summary { font-size: 15px; color: var(--text); line-height: 1.9; margin: 14px 0; }
.summary ul { margin: 0; padding-left: 20px; }
.summary li { margin-bottom: 4px; }

/* Exchanges */
.exchanges { margin: 14px 0; }
.ex-label { font-size: 12px; font-weight: 700; color: var(--pres); letter-spacing: .5px; margin-bottom: 10px; }
.exchange { margin-bottom: 10px; }
.ex-pres {
  background: #f0f4ff; border-left: 3px solid var(--pres);
  padding: 10px 14px; border-radius: 0 8px 8px 0;
  font-size: 15px; color: #1e3a5f; line-height: 1.75;
}
.ex-pres .role { font-weight: 700; font-size: 11.5px; display: inline-block; margin-bottom: 2px; }
.ex-resp {
  background: #f8faf8; border-left: 3px solid #94a3b8;
  padding: 10px 14px; margin-top: 3px; border-radius: 0 8px 8px 0;
  font-size: 14px; color: var(--resp); line-height: 1.75;
}
.ex-resp .role { font-weight: 700; font-size: 11.5px; color: var(--green); display: inline-block; margin-bottom: 2px; }

/* Actions */
.act-label { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: .5px; margin: 12px 0 6px; }
.actions ul { margin: 0; padding-left: 20px; }
.actions li { font-size: 14px; line-height: 1.75; color: var(--sub); margin-bottom: 3px; }
.actions li strong { color: var(--text); }

/* Link to full briefing */
.briefing-link {
  display: inline-block; margin-top: 12px; font-size: 14px;
  color: var(--accent); text-decoration: none; font-weight: 600;
}
.briefing-link:hover { text-decoration: underline; }

/* Highlight */
mark { background: #fef08a; padding: 0 2px; border-radius: 2px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 16px; }

.footer { text-align: left; padding: 40px 20px; color: #aaa; font-size: 12px; line-height: 1.7; max-width: 900px; margin: 0 auto; }
.footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(100%); transition: transform 0.25s; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: block; }
  .main { margin-right: 0; }
  .hero h1 { font-size: 24px; }
  .hero .lead { font-size: 15px; }
  .stats-bar { gap: 16px; }
  .filters { gap: 6px; }
  body { font-size: 16px; }
  .topic-meta h3 { font-size: 16px; }
  .meeting-header h2 { font-size: 18px; }
}
</style>
</head>
<body>

<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>

<aside class="sidebar" id="sidebar">
  <a href="https://slownews.kr" target="_blank" rel="noopener" style="text-decoration:none;">
    <div class="brand">슬로우레터</div>
  </a>
  <div class="brand-sub">국무회의 브리핑.</div>
  <hr class="divider">
  <div class="nav-label">회차별 보기</div>
  <div id="sidebar-nav"></div>
  <hr class="divider">
  <div class="sidebar-footer">
    <span style="color:#fdad00;">slownews.kr</span>
  </div>
</aside>

<div class="main">

<div class="hero">
  <div class="label">슬로우레터</div>
  <h1>국무회의 브리핑.</h1>
  <div class="lead">
    대통령 국무회의 영상을 AI 에이전트로 분석·요약하고 데스킹을 거칩니다.
    대통령 발언, 부처 답변, 지시·결정사항을 안건별로 정리합니다.
  </div>
</div>

<div class="stats-bar">
  <div><span class="v" id="stat-meetings">-</span>회의</div>
  <div><span class="v" id="stat-topics">-</span>안건</div>
  <div><span class="v" id="stat-actions">-</span>지시사항</div>
  <div><span class="v" id="stat-exchanges">-</span>주요 워딩</div>
</div>

<div class="container">

<div class="note">
  Lilys AI 트랜스크립트 기반. 요약은 AI가, 편집 판단은 사람이 합니다.
  발언은 최대한 원문을 그대로 인용하되, 문답으로 구성하는 과정에서 표현을 다듬었습니다.
</div>

<div class="search-box">
  <input type="text" id="q" placeholder="키워드 검색 — 안건, 발언, 부처명...">
</div>

<div class="filters" id="filters">
  <span class="filter-label">회차</span>
  <div id="meeting-filters" style="display:inline-flex;gap:8px;flex-wrap:wrap;"></div>
  <span class="result-count" id="result-count"></span>
</div>

<div id="results"></div>

<div class="footer">
  국무회의 브리핑 — <a href="https://slownews.kr" target="_blank">slownews.kr</a><br>
  AI 분석 · 사람 편집
</div>

</div>
</div>

<script>
var DATA = [];
var currentMeeting = null;  // null = latest meeting (default), 'all' = show all
var currentQuery = '';
var isSearchMode = false;

var meetingFiles = {
  4: 'cabinet_meeting_4_briefing.html',
  5: 'cabinet_meeting_5_briefing.html',
  6: 'cabinet_meeting_6_briefing.html',
  8: 'cabinet_meeting_8_briefing.html',
  9: 'cabinet_meeting_9_briefing.html',
  10: 'cabinet_meeting_10_briefing.html',
  11: 'cabinet_meeting_11_briefing.html',
  13: 'cabinet_meeting_13_briefing.html'
};

var meetingDescriptions = {
  13: '중동 전쟁 한 달, 전속고발제 개편 논의.',
  11: '중동 전쟁 25일째, 에너지 비상대응 체계 가동.',
  10: '석유 최고가격제, 지방 우대, 국민성장펀드.',
  9: '물가·에너지·금융 3중 대응, 포상금 혁신 선언.',
  8: '중동 전쟁 6일째, 비상 경제·에너지 대응.',
  6: '브라질 국빈 방문, K-관광 강국, 담합 제재.',
  5: '국제질서 변화 대응, 외국인력 정책, AI 전략.',
  4: '수출 600억 불, 창업 대전환, 연명의료·담합 제재.'
};

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightText(text, q) {
  if (!q) return esc(text);
  var escaped = esc(text);
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function cardAnchor(item) {
  return 'm' + item.meeting + '-' + (item.id || '').replace(/^t-/, '');
}

function renderCard(item, q) {
  var badge = '제' + item.meeting + '회';
  var file = meetingFiles[item.meeting] || '#';
  var anchor = cardAnchor(item);

  var summaryHtml = '';
  if (item.summary && item.summary.length) {
    summaryHtml = '<div class="summary"><ul>' +
      item.summary.map(function(s) { return '<li>' + highlightText(s, q) + '</li>'; }).join('') +
      '</ul></div>';
  }

  var exHtml = '';
  if (item.exchanges && item.exchanges.length) {
    exHtml = '<div class="exchanges"><div class="ex-label">주요 발언</div>';
    item.exchanges.forEach(function(ex) {
      exHtml += '<div class="exchange">';
      if (ex.president) {
        exHtml += '<div class="ex-pres"><span class="role">대통령</span><br>' + highlightText(ex.president, q) + '</div>';
      }
      if (ex.response) {
        var dept = ex.dept || '';
        exHtml += '<div class="ex-resp"><span class="role">' + esc(dept) + '</span><br>' + highlightText(ex.response, q) + '</div>';
      }
      exHtml += '</div>';
    });
    exHtml += '</div>';
  }

  var actHtml = '';
  if (item.actions && item.actions.length) {
    actHtml = '<div class="act-label">지시·결정사항</div><div class="actions"><ul>' +
      item.actions.map(function(a) {
        return '<li><strong>' + highlightText(a.dept, q) + '</strong> ' + highlightText(a.desc, q) + '</li>';
      }).join('') + '</ul></div>';
  }

  var linkHtml = '<a class="briefing-link" href="' + file + '#' + (item.id || '') + '">전체 브리핑에서 보기 &rarr;</a>';

  return '<div class="topic-card" id="' + anchor + '">' +
    '<div class="topic-head" onclick="toggleCard(this)">' +
      '<div class="topic-badge">' + badge + '</div>' +
      '<div class="topic-meta">' +
        '<h3>' + highlightText(item.title, q) +
          '<a class="permalink" href="#' + anchor + '" title="이 안건 링크" onclick="event.stopPropagation();">#</a>' +
        '</h3>' +
        '<div class="date-line">' + item.date + '</div>' +
      '</div>' +
      '<span class="topic-chevron">&rsaquo;</span>' +
    '</div>' +
    '<div class="topic-body">' +
      summaryHtml + exHtml + actHtml + linkHtml +
    '</div>' +
  '</div>';
}

function toggleCard(headEl) {
  var card = headEl.parentElement;
  card.classList.toggle('open');
}

function matchItem(item, q) {
  if (!q) return true;
  var ql = q.toLowerCase();
  var searchable = (item.title || '') + ' ' +
    (item.summary || []).join(' ') + ' ' +
    (item.exchanges || []).map(function(e) { return (e.president||'') + ' ' + (e.response||'') + ' ' + (e.dept||''); }).join(' ') + ' ' +
    (item.actions || []).map(function(a) { return a.dept + ' ' + a.desc; }).join(' ');
  return searchable.toLowerCase().indexOf(ql) >= 0;
}

function getLatestMeeting() {
  var maxNo = 0;
  DATA.forEach(function(item) {
    if (item.meeting > maxNo) maxNo = item.meeting;
  });
  return maxNo;
}

function getMeetingsList() {
  var meetings = [];
  var seen = {};
  DATA.forEach(function(item) {
    if (!seen[item.meeting]) {
      seen[item.meeting] = true;
      meetings.push({ no: item.meeting, date: item.date });
    }
  });
  meetings.sort(function(a, b) { return b.no - a.no; });
  return meetings;
}

function render() {
  var q = currentQuery;
  isSearchMode = q.length > 0;

  // Determine effective meeting filter
  var effectiveMeeting;
  if (isSearchMode) {
    effectiveMeeting = (currentMeeting === null) ? 'all' : currentMeeting;
  } else {
    effectiveMeeting = (currentMeeting === null) ? getLatestMeeting() : currentMeeting;
  }

  var filtered = DATA.filter(function(item) {
    if (effectiveMeeting !== 'all' && item.meeting !== effectiveMeeting) return false;
    return matchItem(item, q);
  });

  var resultsEl = document.getElementById('results');

  if (filtered.length === 0) {
    resultsEl.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    document.getElementById('result-count').textContent = '0건';
    return;
  }

  // Group by meeting for section headers
  if (isSearchMode || effectiveMeeting === 'all') {
    // In search mode or "전체" view: group by meeting with headers
    var grouped = {};
    var meetingOrder = [];
    filtered.forEach(function(item) {
      if (!grouped[item.meeting]) {
        grouped[item.meeting] = [];
        meetingOrder.push(item.meeting);
      }
      grouped[item.meeting].push(item);
    });
    meetingOrder.sort(function(a, b) { return b - a; });

    var html = '';
    meetingOrder.forEach(function(mNo) {
      var items = grouped[mNo];
      var desc = meetingDescriptions[mNo] || '';
      var mDate = items[0].date;
      html += '<div class="meeting-header">' +
        '<h2>제' + mNo + '회</h2>' +
        '<span class="meeting-date">' + mDate + '</span>' +
        (desc ? '<span class="meeting-desc">' + desc + '</span>' : '') +
      '</div>';
      items.forEach(function(item) {
        html += renderCard(item, q);
      });
    });
    resultsEl.innerHTML = html;
  } else {
    // Single meeting view: show header + cards
    var mNo = effectiveMeeting;
    var desc = meetingDescriptions[mNo] || '';
    var mDate = filtered[0] ? filtered[0].date : '';
    var html = '<div class="meeting-header">' +
      '<h2>제' + mNo + '회</h2>' +
      '<span class="meeting-date">' + mDate + '</span>' +
      (desc ? '<span class="meeting-desc">' + desc + '</span>' : '') +
    '</div>';
    filtered.forEach(function(item) {
      html += renderCard(item, q);
    });
    resultsEl.innerHTML = html;
  }

  document.getElementById('result-count').textContent = filtered.length + '건';

  // Open and scroll to hash target
  handleHash();
}

function setupFilters() {
  var meetings = getMeetingsList();
  var latestNo = getLatestMeeting();

  // Meeting filter chips
  var html = '<span class="filter-chip" data-m="all">전체</span>';
  meetings.forEach(function(m) {
    var isDefault = (currentMeeting === null && m.no === latestNo);
    var isActive = (currentMeeting === m.no) || isDefault;
    html += '<span class="filter-chip' + (isActive ? ' active' : '') + '" data-m="' + m.no + '">' + m.no + '회</span>';
  });
  document.getElementById('meeting-filters').innerHTML = html;

  document.querySelectorAll('.filter-chip').forEach(function(el) {
    el.addEventListener('click', function() {
      var val = this.getAttribute('data-m');
      if (val === 'all') {
        currentMeeting = 'all';
      } else {
        currentMeeting = parseInt(val);
      }
      updateFilterUI();
      render();
      // Update URL hash
      if (currentMeeting === 'all') {
        history.replaceState(null, '', '#all');
      } else if (currentMeeting !== null) {
        history.replaceState(null, '', '#m' + currentMeeting);
      }
    });
  });

  // Sidebar nav
  var navHtml = '';
  meetings.forEach(function(m) {
    var active = (currentMeeting === null && m.no === latestNo) || currentMeeting === m.no ? ' active' : '';
    navHtml += '<a class="nav-link' + active + '" data-m="' + m.no + '" onclick="selectMeeting(' + m.no + ')">' +
      '제' + m.no + '회 <span style="opacity:.6;font-size:.8rem;">' + m.date + '</span></a>';
  });
  document.getElementById('sidebar-nav').innerHTML = navHtml;
}

function selectMeeting(no) {
  currentMeeting = no;
  currentQuery = '';
  document.getElementById('q').value = '';
  updateFilterUI();
  render();
  history.replaceState(null, '', '#m' + no);
  window.scrollTo(0, 0);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function updateFilterUI() {
  var latestNo = getLatestMeeting();
  document.querySelectorAll('.filter-chip').forEach(function(el) {
    var val = el.getAttribute('data-m');
    el.classList.remove('active');
    if (currentMeeting === 'all' && val === 'all') {
      el.classList.add('active');
    } else if (currentMeeting !== null && currentMeeting !== 'all' && parseInt(val) === currentMeeting) {
      el.classList.add('active');
    } else if (currentMeeting === null && parseInt(val) === latestNo) {
      el.classList.add('active');
    }
  });

  // Update sidebar
  document.querySelectorAll('.sidebar .nav-link[data-m]').forEach(function(el) {
    var val = parseInt(el.getAttribute('data-m'));
    el.classList.remove('active');
    if (currentMeeting !== null && currentMeeting !== 'all' && val === currentMeeting) {
      el.classList.add('active');
    } else if (currentMeeting === null && val === latestNo) {
      el.classList.add('active');
    }
  });
}

function updateStats() {
  var meetings = new Set();
  var totalActions = 0;
  var totalExchanges = 0;
  DATA.forEach(function(item) {
    meetings.add(item.meeting);
    totalActions += (item.actions || []).length;
    totalExchanges += (item.exchanges || []).length;
  });
  document.getElementById('stat-meetings').textContent = meetings.size;
  document.getElementById('stat-topics').textContent = DATA.length;
  document.getElementById('stat-actions').textContent = totalActions;
  document.getElementById('stat-exchanges').textContent = totalExchanges;
}

function handleHash() {
  var hash = window.location.hash.replace('#', '');
  if (!hash) return;

  var targetEl = document.getElementById(hash);
  if (targetEl && targetEl.classList.contains('topic-card')) {
    targetEl.classList.add('open');
    targetEl.classList.add('highlighted');
    setTimeout(function() {
      targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
    setTimeout(function() {
      targetEl.classList.remove('highlighted');
    }, 3000);
  }
}

function parseInitialHash() {
  var hash = window.location.hash.replace('#', '');
  if (!hash) return;

  if (hash === 'all') {
    currentMeeting = 'all';
  } else if (hash.match(/^m(\d+)$/)) {
    currentMeeting = parseInt(hash.match(/^m(\d+)$/)[1]);
  } else if (hash.match(/^m(\d+)-/)) {
    // Card-level hash like m13-exports_startup
    var meetingNo = parseInt(hash.match(/^m(\d+)-/)[1]);
    currentMeeting = meetingNo;
  }
}

// Debounced search
var searchTimer;
document.getElementById('q').addEventListener('input', function() {
  var self = this;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    currentQuery = self.value.trim();
    if (currentQuery.length > 0 && currentMeeting !== 'all') {
      // Switch to all meetings when searching, unless a specific filter is set
      if (currentMeeting === null || currentMeeting === getLatestMeeting()) {
        // Auto-switch to all for search
      }
    }
    render();
  }, 200);
});

// Listen for hash changes
window.addEventListener('hashchange', function() {
  parseInitialHash();
  updateFilterUI();
  render();
});

// Load data
parseInitialHash();
fetch('data/briefings.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    DATA = data;
    updateStats();
    setupFilters();
    render();
  })
  .catch(function() {
    document.getElementById('results').innerHTML = '<div class="empty-state">데이터를 불러올 수 없습니다.</div>';
  });
</script>
</body>
